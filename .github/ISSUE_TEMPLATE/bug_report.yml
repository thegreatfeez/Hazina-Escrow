name: Bug Report
description: Something is broken or behaving incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check that you've set up `.env` correctly per [.env.example](../../.env.example) and run `npm install` in both `backend/` and `frontend/`.

  - type: textarea
    id: description
    attributes:
      label: What is broken?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start backend with `npm run dev`
        2. Open marketplace, click "Query Dataset"
        3. Submit with demo mode checked
        4. See error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error message or stack trace if available
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend API
        - Frontend UI
        - Stellar / x402 payments
        - Claude AI
        - Smart Contract
        - Other
    validations:
      required: true
