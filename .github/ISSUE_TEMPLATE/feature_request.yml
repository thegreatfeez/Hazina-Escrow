name: Feature / Enhancement
description: Propose a new capability, UX improvement, API change, or developer-experience enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for product, platform, or engineering improvements.

        If the proposal touches payments, wallets, escrow rules, or other security-sensitive behavior, add rollout and risk notes so reviewers can reason about it early.

  - type: textarea
    id: summary
    attributes:
      label: Request Summary
      description: One short paragraph describing the change
      placeholder: |
        Add a buyer transaction history view that shows payment status, dataset purchased, and seller payout proof.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to Solve
      description: What user, maintainer, or business problem is this addressing?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work? Include flow, API shape, UI notes, or pseudocode if helpful.
    validations:
      required: true

  - type: textarea
    id: user_value
    attributes:
      label: Who Benefits and How
      description: Describe the primary users and the expected outcome
      placeholder: |
        Buyers can verify previous purchases quickly, and support requests are reduced because payout proof is visible in-app.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Urgent / blocking
    validations:
      required: true

  - type: checkboxes
    id: surfaces
    attributes:
      label: Affected Areas
      options:
        - label: Frontend UI
        - label: Backend API
        - label: AI / research agent
        - label: Stellar / x402 payments
        - label: Smart contract
        - label: Data model / storage
        - label: CI / tooling
        - label: Documentation

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
        - [ ] Relevant automated tests cover the new behavior
        - [ ] Existing tests still pass
        - [ ] Any required docs or examples are updated
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Why is this the right approach?

  - type: textarea
    id: risks
    attributes:
      label: Risks, Dependencies, or Unknowns
      description: Call out any migration work, external dependencies, or open questions

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, related issues, examples from other products, or implementation notes
