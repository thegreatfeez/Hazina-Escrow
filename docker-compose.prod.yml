services:
  backend:
    build:
      context: ./backend
      target: production
    env_file:
      - ./backend/.env
    volumes:
      - ./data/datasets.json:/app/data/datasets.json
    expose:
      - "3001"

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend
